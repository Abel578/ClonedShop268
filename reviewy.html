<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #ff9500;
            --gold-light: #eca746;
            --gold-dark: #bb7719;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('Gemini_Generated_Image_uxoxecuxoxecuxox.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--gold-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }

        .header-text {
            color: var(--gold-primary);
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subheader-text {
            color: #ffffff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Montserrat', sans-serif;
        }
/* --- NAVBAR --- */
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        .navbar {
            background-color: #f28c06;
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 12px 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
        }

        .navbar a {
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: opacity 0.2s ease;
        }

        .navbar a:hover {
            opacity: 0.7;
        }
        .review-card {
            background: linear-gradient(145deg, rgb(22 22 32 / 40%), rgb(2 2 2 / 40%));
            border-radius: 24px;
            overflow: hidden;
            box-shadow: rgba(0, 0, 0, 0.3) 0px 15px 40px;
            border: 1px solid #d4af37;
            padding: 1.5rem;
            text-align: center;
            margin: 1rem auto;
            max-width: 300px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: rgba(255, 149, 0, 0.25) 0px 15px 40px;
        }

        .review-card img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 16px;
            object-fit: cover;
            margin: 0 auto;
        }

        .review-card p {
            color: white;
            font-size: 16px;
            margin-top: 1rem;
        }

        .review-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 0 1rem 3rem;
        }

        @media (min-width: 1024px) {
            .review-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 2rem;
                max-width: 1200px;
                margin: 0 auto;
            }
            .review-card { max-width: 100%; }
        }

        /* Fullscreen image modal */
        .image-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .image-modal-overlay.active { display: flex; }

        .image-modal-overlay img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .image-modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s ease;
        }

        .image-modal-close:hover { color: var(--gold-primary); }

        /* Mobile menu button */
        .menu-toggle-btn {
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle-btn:active { transform: scale(0.95); }

        @media (max-width: 768px) {
            html, body { overflow-y: auto; }

            body { background-attachment: scroll; }

            nav.rounded-2xl {
                width: 60% !important;
                margin-top: 8px !important;
                margin-left: auto;
                margin-right: auto;
            }

            nav.rounded-2xl .container {
                padding-left: 8px !important;
                padding-right: 8px !important;
                padding-top: 6px !important;
                padding-bottom: 6px !important;
            }

            .menu-toggle-btn { padding: 6px 12px; }
            .menu-toggle-btn i { font-size: 16px; }

            .header-text { font-size: 36px; }

            .review-card { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->

        <div class="review-grid" data-aos="fade-up" data-aos-delay="100">

    <!-- Fullscreen Image Modal -->
    <div id="imageModal" class="image-modal-overlay">
        <span class="image-modal-close" onclick="closeImageModal()">&times;</span>
        <img id="imageModalImg" src="" alt="Review fullscreen">
    </div>

    <script>
        function openImageModal(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('imageModalImg');
            img.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.getElementById('imageModalImg').src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeImageModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeImageModal();
        });
    </script>
