
<!DOCTYPE html>

<head>

    <title>Cloned Shop - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #ff9500;
            --gold-light: #eca746;
            --gold-dark: #bb7719;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('Gemini_Generated_Image_uxoxecuxoxecuxox.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--gold-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
        }

        .jpRZhs {
            background: linear-gradient(145deg, rgb(22 22 32 / 40%), rgb(2 2 2 / 40%));
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            box-shadow: rgba(0, 0, 0, 0.3) 0px 15px 40px;
            border: 1px solid #d4af37;
            padding: 2rem;
            text-align: center;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .card-logo img {
            width: 120px;
            height: auto;
            object-fit: contain;
        }

        .card-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--gold-light), var(--gold-primary), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .card-subtitle {
            color: #a3a3a3;
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        .card-members {
            background: #eca746;
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .hero-buttons a {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            width: 100%;
            max-width: 300px;
            justify-content: center;
            box-sizing: border-box;
        }

        .join-telegram {
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-primary));
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(212, 126, 55, 0.3);
        }

        .join-telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 126, 55, 0.3);
            background: linear-gradient(45deg, var(--gold-light), var(--gold-primary));
        }

        .join-telegram svg {
            margin-right: 0.5rem;
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Mobile menu button */
        .menu-toggle-btn {
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle-btn:active { transform: scale(0.95); }

        @media (max-width: 768px) {
            html, body { overflow-y: auto; }

            body { background-attachment: scroll; }

            nav.rounded-2xl {
                width: 60% !important;
                margin-top: 8px !important;
                margin-left: auto;
                margin-right: auto;
            }

            nav.rounded-2xl .container {
                padding-left: 8px !important;
                padding-right: 8px !important;
                padding-top: 6px !important;
                padding-bottom: 6px !important;
            }

            .menu-toggle-btn { padding: 6px 12px; }
            .menu-toggle-btn i { font-size: 16px; }

            .jpRZhs {
                max-width: 90%;
                margin-bottom: 1.5rem;
            }

            .hero-buttons a {
                padding: 10px 18px;
                font-size: 13px;
                max-width: 100%;
            }

            .card-logo img { width: 60px; }
            .card-title { font-size: 28px; }
            .card-subtitle { font-size: 0.875rem; }
            .card-members { font-size: 0.75rem; padding: 0.2rem 0.6rem; }
        }
    </style>
</head>
<body>

                <a href="index.html" class="block text-black hover:text-gray-800 text-center" style="font-family: 'Montserrat', sans-serif; font-weight: 500;">Home</a>
                <a href="products.html" class="block text-black hover:text-gray-800 text-center" style="font-family: 'Montserrat', sans-serif; font-weight: 500;">Products</a>

            </div>
        </div>
    </nav>

                <h1 class="card-title">Cloned Shop™</h1>

</body>
